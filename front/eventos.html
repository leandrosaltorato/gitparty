<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Eventos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="logo">GitParty</h1>

        <nav class="menu">
          <a href="eventos.html" class="active">Eventos</a>
          <a href="inscricoes.html">Inscrições</a>
        </nav>
      </aside>

      <main class="content">
        <div class="top">
          <h2>Eventos</h2>
          <button class="btn" onclick="abrirModal()">+ Novo Evento</button>
        </div>

        <input
          type="text"
          id="busca"
          class="search"
          placeholder="Buscar evento..."
        />
        <div id="eventos" class="grid"></div>
      </main>
    </div>
    <div class="modal-bg" id="modal">
      <div class="modal">
        <h2>Novo Evento</h2>
        <input type="text" id="nome" placeholder="Título do evento" />
        <input type="date" id="data" />
        <input type="text" id="local" placeholder="Local" />
        <textarea id="descricao" placeholder="Descrição"></textarea>
        <input type="number" id="capacidade" placeholder="Capacidade máxima" />
        <input type="file" id="imagem" />

        <div class="modal-actions">
          <button class="btn-delete" onclick="fecharModal()">Cancelar</button>
          <button class="btn" onclick="salvarEvento()">Salvar</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
